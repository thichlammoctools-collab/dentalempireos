<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14" />
      <stop offset="100%" stop-color="#1c1c2e" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92ccff" />
      <stop offset="100%" stop-color="#7fb8e6" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#92ccff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#92ccff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="900" cy="315" r="320" fill="url(#glow)" />

  <!-- Decorative top-left bar -->
  <rect x="80" y="80" width="48" height="4" fill="url(#accent)" rx="2" />
  <text x="148" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#92ccff" letter-spacing="3">DENTAL EMPIRE OS</text>

  <!-- Main title -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#ffffff">Hệ Điều Hành</text>
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#92ccff">Quản Trị Nha Khoa</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#a8a8b8">Nền tảng chia sẻ tri thức quản trị nha khoa hàng đầu Việt Nam</text>

  <!-- Pillars -->
  <g transform="translate(80, 490)">
    <rect x="0" y="0" width="140" height="42" rx="21" fill="rgba(146,204,255,0.12)" stroke="rgba(146,204,255,0.4)" />
    <text x="70" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#92ccff" text-anchor="middle" letter-spacing="2">SKY</text>

    <rect x="160" y="0" width="180" height="42" rx="21" fill="rgba(146,204,255,0.12)" stroke="rgba(146,204,255,0.4)" />
    <text x="250" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#92ccff" text-anchor="middle" letter-spacing="2">S.T.A.R.S</text>

    <rect x="360" y="0" width="200" height="42" rx="21" fill="rgba(146,204,255,0.12)" stroke="rgba(146,204,255,0.4)" />
    <text x="460" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#92ccff" text-anchor="middle" letter-spacing="2">R.O.A.D.M.A.P</text>
  </g>

  <!-- Footer URL -->
  <text x="80" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#7a7a8c" letter-spacing="2">dentalempireos.com</text>
</svg>
