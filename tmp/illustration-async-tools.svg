<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="500" fill="url(#bg3)"/>

  <text x="500" y="55" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="30" font-weight="800">Công cụ Async phổ biến</text>
  <text x="500" y="85" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="14" font-weight="500">Hỗ trợ cộng tác không cần online cùng lúc</text>

  <!-- 6 tool cards in 2x3 grid -->
  <!-- Slack -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="#1e293b" stroke="#0d9488" stroke-width="1.5"/>
    <rect x="20" y="20" width="50" height="50" rx="10" fill="#4a154b"/>
    <text x="45" y="52" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="22" font-weight="900">S</text>
    <text x="90" y="42" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">Slack</text>
    <text x="90" y="62" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Nhắn tin theo channel</text>
    <text x="20" y="105" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="11">→ Tin nhắn không cần reply ngay</text>
  </g>

  <!-- Notion -->
  <g transform="translate(370, 140)">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="#1e293b" stroke="#0d9488" stroke-width="1.5"/>
    <rect x="20" y="20" width="50" height="50" rx="10" fill="#000000"/>
    <text x="45" y="54" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="22" font-weight="900">N</text>
    <text x="90" y="42" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">Notion</text>
    <text x="90" y="62" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Tài liệu chia sẻ</text>
    <text x="20" y="105" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="11">→ Wiki + database đa năng</text>
  </g>

  <!-- Asana -->
  <g transform="translate(660, 140)">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="#1e293b" stroke="#0d9488" stroke-width="1.5"/>
    <rect x="20" y="20" width="50" height="50" rx="10" fill="#f06a6a"/>
    <circle cx="32" cy="34" r="4" fill="#fff"/>
    <circle cx="45" cy="34" r="4" fill="#fff"/>
    <circle cx="58" cy="34" r="4" fill="#fff"/>
    <circle cx="32" cy="46" r="4" fill="#fff"/>
    <circle cx="45" cy="46" r="4" fill="#fff"/>
    <circle cx="58" cy="46" r="4" fill="#fff"/>
    <text x="90" y="42" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">Asana / Trello</text>
    <text x="90" y="62" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Quản lý task</text>
    <text x="20" y="105" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="11">→ Board Kanban trực quan</text>
  </g>

  <!-- Loom -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="#1e293b" stroke="#0d9488" stroke-width="1.5"/>
    <rect x="20" y="20" width="50" height="50" rx="10" fill="#625df5"/>
    <polygon points="38,38 38,52 52,45" fill="#fff"/>
    <text x="90" y="42" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">Loom</text>
    <text x="90" y="62" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Video ghi sẵn</text>
    <text x="20" y="105" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="11">→ Thay thế cuộc họp đồng bộ</text>
  </g>

  <!-- Google Docs -->
  <g transform="translate(370, 300)">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="#1e293b" stroke="#0d9488" stroke-width="1.5"/>
    <rect x="20" y="20" width="50" height="50" rx="10" fill="#ffffff"/>
    <rect x="28" y="30" width="34" height="30" rx="2" fill="none" stroke="#4285f4" stroke-width="2"/>
    <path d="M 28 30 L 45 45 L 62 30" fill="none" stroke="#4285f4" stroke-width="2"/>
    <text x="90" y="42" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">Google Docs</text>
    <text x="90" y="62" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Tài liệu real-time</text>
    <text x="20" y="105" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="11">→ Comment + edit không cần họp</text>
  </g>

  <!-- Email -->
  <g transform="translate(660, 300)">
    <rect x="0" y="0" width="260" height="130" rx="12" fill="#1e293b" stroke="#0d9488" stroke-width="1.5"/>
    <rect x="20" y="20" width="50" height="50" rx="10" fill="#ea4335"/>
    <rect x="28" y="32" width="34" height="26" rx="2" fill="#fff"/>
    <path d="M 28 32 L 45 47 L 62 32" fill="none" stroke="#ea4335" stroke-width="2"/>
    <text x="90" y="42" fill="#f1f5f9" font-family="-apple-system, sans-serif" font-size="18" font-weight="700">Email</text>
    <text x="90" y="62" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="12">Giao tiếp formal</text>
    <text x="20" y="105" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="11">→ Tài liệu hóa & lưu trữ lâu dài</text>
  </g>
</svg>