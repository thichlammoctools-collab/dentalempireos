<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glowing orbs representing different timezones -->
  <circle cx="280" cy="200" r="180" fill="url(#glow)"/>
  <circle cx="900" cy="430" r="200" fill="url(#glow)"/>

  <!-- Globe wireframe in center -->
  <g transform="translate(600, 315)" opacity="0.25" stroke="#0d9488" stroke-width="1.5" fill="none">
    <circle cx="0" cy="0" r="140"/>
    <ellipse cx="0" cy="0" rx="140" ry="55"/>
    <ellipse cx="0" cy="0" rx="140" ry="100"/>
    <ellipse cx="0" cy="0" rx="55" ry="140"/>
    <ellipse cx="0" cy="0" rx="100" ry="140"/>
    <line x1="-140" y1="0" x2="140" y2="0"/>
    <line x1="0" y1="-140" x2="0" y2="140"/>
  </g>

  <!-- Three person avatars representing different timezones -->
  <!-- Person 1 - Tokyo/Asia (left, daytime) -->
  <g transform="translate(280, 470)">
    <circle cx="0" cy="-30" r="28" fill="#0d9488"/>
    <path d="M -42 30 Q -42 -10 0 -10 Q 42 -10 42 30 L 42 50 L -42 50 Z" fill="#0d9488"/>
    <!-- Sun icon -->
    <g transform="translate(0, -85)">
      <circle cx="0" cy="0" r="14" fill="#fbbf24"/>
      <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-22" x2="0" y2="-28"/>
        <line x1="0" y1="22" x2="0" y2="28"/>
        <line x1="-22" y1="0" x2="-28" y2="0"/>
        <line x1="22" y1="0" x2="28" y2="0"/>
        <line x1="-16" y1="-16" x2="-20" y2="-20"/>
        <line x1="16" y1="-16" x2="20" y2="-20"/>
        <line x1="-16" y1="16" x2="-20" y2="20"/>
        <line x1="16" y1="16" x2="20" y2="20"/>
      </g>
    </g>
    <text x="0" y="85" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">GMT+7</text>
  </g>

  <!-- Person 2 - Europe/Mid (center, work time) -->
  <g transform="translate(600, 470)">
    <circle cx="0" cy="-30" r="28" fill="#06b6d4"/>
    <path d="M -42 30 Q -42 -10 0 -10 Q 42 -10 42 30 L 42 50 L -42 50 Z" fill="#06b6d4"/>
    <!-- Clock icon -->
    <g transform="translate(0, -85)" fill="none" stroke="#94a3b8" stroke-width="2.5">
      <circle cx="0" cy="0" r="14" fill="#1e293b"/>
      <line x1="0" y1="0" x2="0" y2="-9" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="7" y2="0" stroke-linecap="round"/>
    </g>
    <text x="0" y="85" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">GMT+1</text>
  </g>

  <!-- Person 3 - Americas (right, nighttime) -->
  <g transform="translate(920, 470)">
    <circle cx="0" cy="-30" r="28" fill="#7c3aed"/>
    <path d="M -42 30 Q -42 -10 0 -10 Q 42 -10 42 30 L 42 50 L -42 50 Z" fill="#7c3aed"/>
    <!-- Moon icon -->
    <g transform="translate(0, -85)">
      <path d="M 6 -10 A 12 12 0 1 1 6 10 A 8 8 0 1 0 6 -10 Z" fill="#94a3b8"/>
      <circle cx="-8" cy="-6" r="1.5" fill="#fbbf24"/>
      <circle cx="12" cy="4" r="1.5" fill="#fbbf24"/>
    </g>
    <text x="0" y="85" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">GMT-5</text>
  </g>

  <!-- Async connection arrows -->
  <g fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-dasharray="6,4">
    <path d="M 320 440 Q 460 380 560 440"/>
    <path d="M 640 440 Q 780 380 880 440"/>
  </g>
  <!-- Arrow tips -->
  <g fill="#0d9488">
    <polygon points="560,440 552,435 552,445"/>
    <polygon points="880,440 872,435 872,445"/>
  </g>

  <!-- Title -->
  <text x="600" y="100" text-anchor="middle" fill="#f1f5f9" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" letter-spacing="-1">
    Asynchronous Working
  </text>
  <text x="600" y="148" text-anchor="middle" fill="#0d9488" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" letter-spacing="2">
    LÀM VIỆC BẤT ĐỒNG BỘ — MÔ HÌNH MỚI CHO TEAM NHA KHOA
  </text>

  <!-- Brand badge -->
  <g transform="translate(600, 580)">
    <rect x="-110" y="-22" width="220" height="44" rx="22" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="1.5"/>
    <text x="0" y="6" text-anchor="middle" fill="#5eead4" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" letter-spacing="3">DENTAL EMPIRE OS</text>
  </g>
</svg>